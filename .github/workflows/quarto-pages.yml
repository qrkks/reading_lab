name: Render Quarto books

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render books
        shell: bash
        run: |
          set -euo pipefail

          slug_for() {
            case "$1" in
              "《概率论与数理统计》教学视频 2.0版本【宋浩老师】")
                echo "songhao-probability-statistics"
                ;;
              "数理统计学导论（Hogg）")
                echo "hogg-introduction-mathematical-statistics"
                ;;
              "概率论与数理统计（浙大版）")
                echo "zheda-probability-statistics"
                ;;
              "概率论与统计推断（Hogg）")
                echo "hogg-probability-statistical-inference"
                ;;
              "统计推断（Casella）")
                echo "casella-statistical-inference"
                ;;
              "高等数学第8版（同济大学数学科学学院）")
                echo "tongji-advanced-mathematics"
                ;;
              *)
                echo "$1"
                ;;
            esac
          }

          mkdir -p public
          touch public/.nojekyll

          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Reading Lab</title>
            <style>
              body {
                max-width: 820px;
                margin: 48px auto;
                padding: 0 20px;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                line-height: 1.65;
              }
              h1 { margin-bottom: 8px; }
              ul { padding-left: 1.4rem; }
              li { margin: 0.45rem 0; }
            </style>
          </head>
          <body>
            <h1>Reading Lab</h1>
            <p>Quarto notes rendered from the repository.</p>
            <ul>
          HTML

          find books -mindepth 3 -maxdepth 3 -name _quarto.yml -print0 |
            sort -z |
            while IFS= read -r -d '' config; do
              book_dir="$(dirname "$config")"
              book_title="$(basename "$(dirname "$book_dir")")"
              # book_slug="$(slug_for "$book_title")"
              book_slug="$book_title"
              render_dir="$(mktemp -d)"

              cp -a "$book_dir" "$render_dir/book"
              while IFS= read -r -d '' doc; do
                cp _quarto-html.yml "$(dirname "$doc")/_metadata.yml"
              done < <(find "$render_dir/book" -type f \( -name '*.qmd' -o -name '*.md' \) -print0)
              quarto render "$render_dir/book" --to html

              mkdir -p "public/$book_slug"
              rsync -a --delete "$render_dir/book/_book/" "public/$book_slug/"
              printf '      <li><a href="./%s/">%s</a></li>\n' "$book_slug" "$book_title" >> public/index.html
              rm -rf "$render_dir"
            done

          cat >> public/index.html <<'HTML'
            </ul>
          </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
